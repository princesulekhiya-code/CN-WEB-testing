name: Frontend - CI/CD + DevSecOps

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # =========================
  # 🔨 BUILD
  # =========================
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Type Check
        run: npm run typecheck

      - name: CI checks completed
        run: echo "Install and typecheck completed successfully"

  # =========================
  # 🐳 DOCKER → Docker Hub + Trivy scan
  # =========================
  # Repository → Settings → Secrets and variables → Actions:
  #   DOCKERHUB_USERNAME — Docker Hub username
  #   DOCKERHUB_TOKEN    — Access Token (read & write)
  # Optional → Variables: DOCKERHUB_REPO (default below is cn-web-frontend)
  docker:
    runs-on: ubuntu-latest
    needs: build
    # Skip on fork PRs (no secrets / invalid image name)
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/${{ vars.DOCKERHUB_REPO || 'cn-web-frontend' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (load locally for Trivy + push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          push: false
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner on image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          scanners: vuln
          severity: CRITICAL,HIGH,MEDIUM
          format: table
          # Set to "1" to fail the job when vulnerabilities are found
          exit-code: "0"

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push image to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker push "${{ env.DOCKER_IMAGE }}:${{ github.sha }}"
          docker push "${{ env.DOCKER_IMAGE }}:latest"
