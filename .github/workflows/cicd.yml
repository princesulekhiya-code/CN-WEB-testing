name: Frontend - CI/CD + DevSecOps

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # =========================
  # 🔨 BUILD
  # =========================
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Type Check
        run: npm run typecheck

      - name: Build Next.js App
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Build Docker Image
        run: |
          docker build -t frontend:${{ github.sha }} \
            --build-arg NEXT_PUBLIC_API_URL="${{ secrets.NEXT_PUBLIC_API_URL }}" \
            --build-arg NEXT_PUBLIC_SUPABASE_URL="${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}" \
            --build-arg NEXT_PUBLIC_SUPABASE_ANON_KEY="${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}" \
            .

      - name: Save Docker Image
        run: docker save -o image.tar frontend:${{ github.sha }}

      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: |
            .next/
            package.json
            package-lock.json

  # =========================
  # 🔍 SONARQUBE
  # =========================
  sonarqube:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Tests with Coverage
        run: |
          # Create a basic test coverage report (if you have tests)
          # npm run test:coverage || echo "No tests configured"
          echo "Test coverage placeholder - configure Jest/Vitest for actual coverage"

      - name: SonarQube Scanner
        uses: sonarsource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_IP }}
        with:
          args: >
            -Dsonar.projectKey=frontend
            -Dsonar.projectName=frontend
            -Dsonar.sources=.
            -Dsonar.exclusions=node_modules/**,**/*.test.ts,**/*.test.tsx,.next/**,out/**,build/**
            -Dsonar.typescript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

      - name: SonarQube Quality Gate
        uses: sonarsource/sonarqube-quality-gate-action@v1.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_IP }}
        with:
          scanMetadataReportFile: .scannerwork/report-task.txt

      - name: Generate SonarQube Summary Report
        if: always()
        run: |
          echo "================================================" > sonarqube-report.txt
          echo "       SONARQUBE SCAN REPORT - Frontend        " >> sonarqube-report.txt
          echo "================================================" >> sonarqube-report.txt
          echo "Project   : frontend"                           >> sonarqube-report.txt
          echo "Branch    : ${{ github.ref_name }}"             >> sonarqube-report.txt
          echo "Commit    : ${{ github.sha }}"                  >> sonarqube-report.txt
          echo "Run       : ${{ github.run_number }}"           >> sonarqube-report.txt
          echo "Timestamp : $(date -u)"                        >> sonarqube-report.txt
          echo "Dashboard : http://${{ secrets.SONAR_IP }}/dashboard?id=frontend" >> sonarqube-report.txt
          echo "------------------------------------------------" >> sonarqube-report.txt
          echo "" >> sonarqube-report.txt
          echo "--- SCAN SUMMARY ---" >> sonarqube-report.txt
          echo "✅ TypeScript compilation: SUCCESS" >> sonarqube-report.txt
          echo "✅ ESLint checks: SUCCESS" >> sonarqube-report.txt
          echo "✅ Next.js build: SUCCESS" >> sonarqube-report.txt
          echo "================================================" >> sonarqube-report.txt
          cat sonarqube-report.txt

      - name: Upload SonarQube Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sonarqube-report
          path: |
            sonarqube-report.txt
            .scannerwork/

  # =========================
  # 🔐 SNYK
  # =========================
  snyk:
    runs-on: ubuntu-latest
    needs: sonarqube
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker Image
        run: docker load -i image.tar

      - name: Install Snyk + Dependencies
        run: |
          npm install -g snyk snyk-to-html
          sudo apt-get update && sudo apt-get install -y jq

      - name: Snyk Dependency Scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          # Test npm dependencies
          snyk test --json > snyk-deps-report.json || true
          
          # Test container
          snyk container test frontend:${{ github.sha }} --json > snyk-container-report.json || true
          
          # Check for critical/high vulnerabilities in dependencies
          DEPS_CRITICAL=$(jq '[.vulnerabilities[]? | select(.severity=="critical")] | length' snyk-deps-report.json 2>/dev/null || echo 0)
          DEPS_HIGH=$(jq '[.vulnerabilities[]? | select(.severity=="high")] | length' snyk-deps-report.json 2>/dev/null || echo 0)
          
          # Check for critical/high vulnerabilities in container
          CONTAINER_CRITICAL=$(jq '[.vulnerabilities[]? | select(.severity=="critical")] | length' snyk-container-report.json 2>/dev/null || echo 0)
          CONTAINER_HIGH=$(jq '[.vulnerabilities[]? | select(.severity=="high")] | length' snyk-container-report.json 2>/dev/null || echo 0)
          
          TOTAL_CRITICAL=$((DEPS_CRITICAL + CONTAINER_CRITICAL))
          TOTAL_HIGH=$((DEPS_HIGH + CONTAINER_HIGH))
          TOTAL_CRITICAL_HIGH=$((TOTAL_CRITICAL + TOTAL_HIGH))
          
          echo "Dependencies - Critical: $DEPS_CRITICAL, High: $DEPS_HIGH"
          echo "Container - Critical: $CONTAINER_CRITICAL, High: $CONTAINER_HIGH"
          echo "Total Critical+High: $TOTAL_CRITICAL_HIGH"
          
          # Fail if critical/high vulnerabilities found
          if [ "$TOTAL_CRITICAL_HIGH" -gt 0 ]; then
            echo "❌ Security scan failed: Found $TOTAL_CRITICAL_HIGH critical/high vulnerabilities"
            echo "SNYK_STATUS=FAILED" >> $GITHUB_ENV
            exit 1
          else
            echo "✅ Security scan passed: No critical/high vulnerabilities found"
            echo "SNYK_STATUS=PASSED" >> $GITHUB_ENV
          fi
          
          # Monitor in Snyk UI
          snyk monitor --project-name="CloudNexus-Frontend-${{ github.ref_name }}" || true
          snyk container monitor frontend:${{ github.sha }} --project-name="CloudNexus-Frontend-Container-${{ github.ref_name }}" || true
          
          # Generate HTML reports
          snyk-to-html -i snyk-deps-report.json -o snyk-deps-report.html || true
          snyk-to-html -i snyk-container-report.json -o snyk-container-report.html || true

      - name: Generate Enhanced Snyk Summary Report
        if: always()
        run: |
          echo "================================================" > snyk-summary.txt
          echo "         SNYK SECURITY SCAN REPORT             " >> snyk-summary.txt
          echo "================================================" >> snyk-summary.txt
          echo "Image     : frontend:${{ github.sha }}"         >> snyk-summary.txt
          echo "Branch    : ${{ github.ref_name }}"             >> snyk-summary.txt
          echo "Commit    : ${{ github.sha }}"                  >> snyk-summary.txt
          echo "Project   : CloudNexus-Frontend-${{ github.ref_name }}" >> snyk-summary.txt
          echo "Dashboard : https://app.snyk.io/"              >> snyk-summary.txt
          echo "Timestamp : $(date -u)"                        >> snyk-summary.txt
          echo "------------------------------------------------" >> snyk-summary.txt
          echo "" >> snyk-summary.txt
          
          # Dependencies vulnerabilities
          DEPS_CRITICAL=$(jq '[.vulnerabilities[]? | select(.severity=="critical")] | length' snyk-deps-report.json 2>/dev/null || echo 0)
          DEPS_HIGH=$(jq '[.vulnerabilities[]? | select(.severity=="high")] | length' snyk-deps-report.json 2>/dev/null || echo 0)
          DEPS_MEDIUM=$(jq '[.vulnerabilities[]? | select(.severity=="medium")] | length' snyk-deps-report.json 2>/dev/null || echo 0)
          DEPS_LOW=$(jq '[.vulnerabilities[]? | select(.severity=="low")] | length' snyk-deps-report.json 2>/dev/null || echo 0)
          
          # Container vulnerabilities
          CONTAINER_CRITICAL=$(jq '[.vulnerabilities[]? | select(.severity=="critical")] | length' snyk-container-report.json 2>/dev/null || echo 0)
          CONTAINER_HIGH=$(jq '[.vulnerabilities[]? | select(.severity=="high")] | length' snyk-container-report.json 2>/dev/null || echo 0)
          CONTAINER_MEDIUM=$(jq '[.vulnerabilities[]? | select(.severity=="medium")] | length' snyk-container-report.json 2>/dev/null || echo 0)
          CONTAINER_LOW=$(jq '[.vulnerabilities[]? | select(.severity=="low")] | length' snyk-container-report.json 2>/dev/null || echo 0)
          
          echo "📦 DEPENDENCIES VULNERABILITIES:"               >> snyk-summary.txt
          echo "  Critical   : $DEPS_CRITICAL"                >> snyk-summary.txt
          echo "  High       : $DEPS_HIGH"                    >> snyk-summary.txt
          echo "  Medium     : $DEPS_MEDIUM"                  >> snyk-summary.txt
          echo "  Low        : $DEPS_LOW"                     >> snyk-summary.txt
          echo "" >> snyk-summary.txt
          echo "🐳 CONTAINER VULNERABILITIES:"                 >> snyk-summary.txt
          echo "  Critical   : $CONTAINER_CRITICAL"           >> snyk-summary.txt
          echo "  High       : $CONTAINER_HIGH"               >> snyk-summary.txt
          echo "  Medium     : $CONTAINER_MEDIUM"             >> snyk-summary.txt
          echo "  Low        : $CONTAINER_LOW"                >> snyk-summary.txt
          echo "" >> snyk-summary.txt
          
          echo "------------------------------------------------" >> snyk-summary.txt
          echo "CRITICAL & HIGH VULNERABILITIES:"              >> snyk-summary.txt
          echo "------------------------------------------------" >> snyk-summary.txt
          
          # Dependencies critical/high details
          echo "📦 Dependencies:" >> snyk-summary.txt
          jq -r '.vulnerabilities[]? | select(.severity=="critical" or .severity=="high") |
            "[⚠️ " + (.severity | ascii_upcase) + "] " + .title +
            "\n  📦 Package : " + .packageName +
            "\n  📊 Version : " + .version +
            "\n  🔧 Fix     : " + (.fixedIn[0] // "No fix available") +
            "\n"' snyk-deps-report.json >> snyk-summary.txt 2>/dev/null || echo "  ✅ No critical/high dependency vulnerabilities" >> snyk-summary.txt
          
          echo "" >> snyk-summary.txt
          echo "🐳 Container:" >> snyk-summary.txt
          jq -r '.vulnerabilities[]? | select(.severity=="critical" or .severity=="high") |
            "[⚠️ " + (.severity | ascii_upcase) + "] " + .title +
            "\n  📦 Package : " + .packageName +
            "\n  📊 Version : " + .version +
            "\n  🔧 Fix     : " + (.fixedIn[0] // "No fix available") +
            "\n"' snyk-container-report.json >> snyk-summary.txt 2>/dev/null || echo "  ✅ No critical/high container vulnerabilities" >> snyk-summary.txt
          
          echo "================================================" >> snyk-summary.txt
          cat snyk-summary.txt

      - name: Upload Enhanced Snyk Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-report
          path: |
            snyk-summary.txt
            snyk-deps-report.json
            snyk-container-report.json
            snyk-deps-report.html
            snyk-container-report.html

  # =========================
  # 🔍 TRIVY
  # =========================
  trivy:
    runs-on: ubuntu-latest
    needs: snyk
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Download Docker Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Trivy Scan - Security Gate Check
        uses: aquasecurity/trivy-action@master
        with:
          input: image.tar
          format: json
          output: trivy-report.json
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Trivy Scan - Table (Console)
        uses: aquasecurity/trivy-action@master
        with:
          input: image.tar
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Generate Trivy Summary Report
        if: always()
        run: |
          echo "================================================" > trivy-summary.txt
          echo "          TRIVY IMAGE SCAN REPORT              " >> trivy-summary.txt
          echo "================================================" >> trivy-summary.txt
          echo "Image     : frontend:${{ github.sha }}"         >> trivy-summary.txt
          echo "Branch    : ${{ github.ref_name }}"             >> trivy-summary.txt
          echo "Commit    : ${{ github.sha }}"                  >> trivy-summary.txt
          echo "Severity  : HIGH, CRITICAL"                    >> trivy-summary.txt
          echo "Timestamp : $(date -u)"                        >> trivy-summary.txt
          echo "------------------------------------------------" >> trivy-summary.txt
          echo "" >> trivy-summary.txt
          CRITICAL=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL")] | length' trivy-report.json 2>/dev/null || echo 0)
          HIGH=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH")] | length' trivy-report.json 2>/dev/null || echo 0)
          echo "SUMMARY:"                                       >> trivy-summary.txt
          echo "  Critical : $CRITICAL"                        >> trivy-summary.txt
          echo "  High     : $HIGH"                            >> trivy-summary.txt
          echo "" >> trivy-summary.txt
          echo "------------------------------------------------" >> trivy-summary.txt
          echo "CRITICAL VULNERABILITIES:"                     >> trivy-summary.txt
          echo "------------------------------------------------" >> trivy-summary.txt
          jq -r '.Results[]?.Vulnerabilities[]? | select(.Severity=="CRITICAL") |
            "[CRITICAL] " + .VulnerabilityID +
            "\n  Package    : " + .PkgName +
            "\n  Installed  : " + .InstalledVersion +
            "\n  Fixed In   : " + (.FixedVersion // "No fix available") +
            "\n  Title      : " + (.Title // "N/A") +
            "\n"' trivy-report.json >> trivy-summary.txt 2>/dev/null || echo "  No critical vulnerabilities found" >> trivy-summary.txt
          echo "------------------------------------------------" >> trivy-summary.txt
          echo "HIGH VULNERABILITIES:"                         >> trivy-summary.txt
          echo "------------------------------------------------" >> trivy-summary.txt
          jq -r '.Results[]?.Vulnerabilities[]? | select(.Severity=="HIGH") |
            "[HIGH] " + .VulnerabilityID +
            "\n  Package    : " + .PkgName +
            "\n  Installed  : " + .InstalledVersion +
            "\n  Fixed In   : " + (.FixedVersion // "No fix available") +
            "\n  Title      : " + (.Title // "N/A") +
            "\n"' trivy-report.json >> trivy-summary.txt 2>/dev/null || echo "  No high vulnerabilities found" >> trivy-summary.txt
          echo "================================================" >> trivy-summary.txt
          cat trivy-summary.txt

      - name: Upload Trivy Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: |
            trivy-summary.txt
            trivy-report.json

  # =========================
  # 🛡️ STACKHAWK
  # =========================
  stackhawk:
    runs-on: ubuntu-latest
    needs: trivy
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create StackHawk Config for Frontend
        run: |
          cat > stackhawk.yml << EOF
          app:
            applicationId: ${{ secrets.HAWK_APP_ID_FRONTEND }}
            env: dev
            host: http://13.201.109.105:3000

          hawk:
            spider:
              base: true
              maxDurationMinutes: 5
              ajaxBrowser: CHROME_HEADLESS
            startupTimeoutMinutes: 5
            scan:
              concurrentRequests: '20'
              throttlePassiveBacklog: '10000'

          scan:
            baseUrl: http://13.201.109.105:3000
            paths:
              # Main pages
              - path: /
                methods: [GET]
              - path: /about
                methods: [GET]
              - path: /services
                methods: [GET]
              - path: /careers
                methods: [GET]
              - path: /blog
                methods: [GET]
              - path: /contact
                methods: [GET]
              
              # API routes (if any)
              - path: /api/health
                methods: [GET]
          EOF

      - name: Download Docker Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load and Start Frontend Container
        run: |
          docker load -i image.tar
          docker run -d -p 3000:3000 --name frontend-test frontend:${{ github.sha }}
          sleep 30  # Wait for container to start

      - name: StackHawk Scan
        uses: stackhawk/hawkscan-action@v2
        with:
          apiKey: ${{ secrets.HAWK_API_KEY }}
          hawk-scan-failure-threshold: medium

      - name: Stop Frontend Container
        if: always()
        run: docker stop frontend-test && docker rm frontend-test

      - name: Upload StackHawk Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stackhawk-report
          path: .hawk/

  # =========================
  # 🐳 DOCKER PUSH
  # =========================
  docker-push:
    runs-on: ubuntu-latest
    needs: [build, sonarqube, snyk, trivy, stackhawk]
    if: github.ref == 'refs/heads/main' && needs.sonarqube.result == 'success'
    steps:
      - name: Quality Gate Summary
        run: |
          echo "================================================"
          echo "         🎯 QUALITY GATE SUMMARY               "
          echo "================================================"
          echo "✅ Build: SUCCESS"
          echo "✅ SonarQube: ${{ needs.sonarqube.result }}"
          echo "✅ Snyk: ${{ needs.snyk.result }}"
          echo "✅ Trivy: ${{ needs.trivy.result }}"
          echo "✅ StackHawk: ${{ needs.stackhawk.result }}"
          echo "================================================"
          echo "🚀 All quality gates passed! Proceeding with Docker push..."
          echo "================================================"

      - name: Download Docker Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image

      - name: Load Docker Image
        run: docker load -i image.tar

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Push Docker Image
        run: |
          docker tag frontend:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/cloudnexus1-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/cloudnexus1-frontend:latest